name: TripBudgetJar
options:
  bundleIdPrefix: com.shimondeitel.tripjar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  TripBudgetJar:
    type: application
    platform: iOS
    sources:
      - path: TripBudgetJar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripjar
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: TripBudgetJar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TripBudgetJarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TripBudgetJarTests
      - path: TripBudgetJar.storekit
    dependencies:
      - target: TripBudgetJar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripjar.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TripBudgetJarUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TripBudgetJarUITests
    dependencies:
      - target: TripBudgetJar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripjar.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  TripBudgetJar:
    build:
      targets:
        TripBudgetJar: all
        TripBudgetJarTests: [test]
        TripBudgetJarUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: TripBudgetJar.storekit
    test:
      config: Debug
      storeKitConfiguration: TripBudgetJar.storekit
      targets:
        - TripBudgetJarTests
        - TripBudgetJarUITests
    archive:
      config: Release
